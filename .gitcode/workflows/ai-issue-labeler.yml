name: AI Issue Labeler

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to label
        required: true
        type: number
  issues:
    types:
      - opened
      - edited

jobs:
  label:
    runs-on: euleros-2.10.1
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: checkout-action@0.0.1

      - name: Setup Python
        uses: setup-python@0.0.1
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: cd repo_workspace && python -m pip install --upgrade openai

      - name: Analyze issue and apply labels
        env:
          LABELER_PLATFORM: gitcode
          AI_BASE_URL: https://api.nanoda.work/v1
          AI_MODEL: Nvidia/qwen/qwen3-coder-480b-a35b-instruct
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITCODE_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: cd repo_workspace && python .github/scripts/ai_issue_labeler.py
